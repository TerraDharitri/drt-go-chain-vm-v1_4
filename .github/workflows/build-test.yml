name: Build and run tests

on:
  pull_request:
    branches: [ main, rc/*, feat/* ,dev]
    types: [ opened, ready_for_review ]
  push:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.23.6]
        os: [ubuntu-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: | 
        make test

    - name: Test (MacOS)
      if: runner.os == 'macOS'
      run: | 
        make test-w2

      
